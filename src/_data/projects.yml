    title: Lokko
    start_date: November 2025
    end_date: Present
    description: |
      ‣ Building gameplay and backend features, basically making sure the game actually works.

      ‣ Shipped contests, achievements and other things that make players feel accomplished.

      ‣ Wired up backend services and APIs so the game doesn't fall apart in production (fingers crossed).

      ‣ Dabbled in shaders, mostly breaking them, occasionally making something pretty. This is still new for me.

      ‣ Stepped into backend territory with LLM help and management's permission. A true team effort.

      ‣ Survived a live production environment and learned more in months than years of tutorials.
