    description: |
      ‣ Worked as a Lead Engineer for Rovio's Battle Bay. 

      ‣ Managed a team of four. We shipped things. On time, mostly.

      ‣ Juggled designers, artists, QA and data folks without losing my mind (mostly).

      ‣ Built a CI/CD pipeline so builds stopped being everyone's least favorite ritual.

      ‣ Kept AWS instances alive and behaving. It's more exciting than it sounds.

      ‣ Fixed bugs, shipped features and kept the lights on.
